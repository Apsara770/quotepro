<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Designer Pro | Premium Design Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Pacifico&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <h1>Quote<span>Pro</span></h1>
            </div>

            <section class="control-group">
                <h3>Canvas Settings</h3>
                <button id="newDesignBtn" class="btn-primary">+ New Design</button>
                <label>Aspect Ratio</label>
                <div class="btn-group-grid">
                    <button class="ratio-btn active" data-ratio="1/1">1:1 (Post)</button>
                    <button class="ratio-btn" data-ratio="9/16">9:16 (Story)</button>
                    <button class="ratio-btn" data-ratio="16/9">16:9 (YT)</button>
                </div>
            </section>

            <section class="control-group">
    <h3>Stock Photos (Unsplash)</h3>
    <div class="row">
        <input type="text" id="photoSearchInput" placeholder="Search photos (e.g. Nature)">
        <button id="searchPhotosBtn" class="btn-primary" style="margin-top: 10px;">Search</button>
    </div>
    <div id="photoResults" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; max-height: 200px; overflow-y: auto; margin-top: 10px;">
        </div>
</section>

            <section class="control-group">
                <h3>Background</h3>
                <label class="file-input">
                    Upload Background
                    <input type="file" id="bgUpload" accept="image/*">
                </label>
            </section>

            <section class="control-group">
                <h3>Elements</h3>
                <button id="addTextBtn" class="btn-primary">Add Text</button>
                <label class="file-input secondary">
                    Add Image / Logo
                    <input type="file" id="elementUpload" accept="image/*">
                </label>
            </section>

            <section class="control-group" id="editorPanel">
                <h3>Style Editor</h3>
                <p class="hint">Select an element to edit</p>
                
                <div class="controls-hidden" id="textControls">
                    <div class="row">
                        <label>Font</label>
                        <select id="fontFamily">
                            <option value="Arial">Arial</option>
                            <option value="Montserrat">Montserrat</option>
                            <option value="Roboto">Roboto</option>
                            <option value="Pacifico">Pacifico</option>
                        </select>
                    </div>
                    <div class="row">
                        <label>Size</label>
                        <input type="range" id="fontSize" min="10" max="150" value="30">
                    </div>
                    <div class="row">
                        <label>Color</label>
                        <input type="color" id="textColor" value="#ffffff">
                    </div>
                    <div class="btn-group">
                        <button id="boldBtn">B</button>
                        <button id="italicBtn">I</button>
                    </div>
                </div>

                <div class="controls-hidden" id="imageControls">
                    <label style="margin-top: 15px; display: block;">Shape Style</label>
                    <div class="btn-group">
                        <button class="shape-btn" data-shape="square">Square</button>
                        <button class="shape-btn" data-shape="circle">Circle</button>
                        <button class="shape-btn" data-shape="oval">Oval</button>
                    </div>
                    <div class="row" style="margin-top: 20px;">
                        <label>Opacity</label>
                        <input type="range" id="elOpacity" min="0.1" max="1" step="0.1" value="1">
                    </div>
                </div>

                <button id="deleteBtn" class="btn-outline" style="border-color: #ff4d4d; color: #ff4d4d; margin-top: 20px;">
                    Delete Selected
                </button>
            </section>

            <section class="control-group">
                <h3>History</h3>
                <div class="btn-group">
                    <button id="undoBtn" class="btn-outline">Undo</button>
                    <button id="redoBtn" class="btn-outline">Redo</button>
                </div>
            </section>

            <section class="control-group export-group">
                <h3>Export</h3>
                <button id="downloadPNG" class="btn-outline">Download PNG</button>
                <button id="downloadPDF" class="btn-outline">Download PDF</button>
            </section>
        </aside>

        <main class="workspace">
            <div id="canvasContainer" class="canvas-container">
                <div id="guide-x" class="guide-line v-guide"></div>
                <div id="guide-y" class="guide-line h-guide"></div>
                
                <div id="mainCanvas" class="design-canvas"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
